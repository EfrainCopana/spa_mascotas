<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Pet Spa</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container" style="width: 380px;">
    <h2>🐾 Registro de Cliente</h2>

    <form action="/registro" method="POST">
        <input type="text" name="nombre" placeholder="Nombre completo" required>
        <input type="email" name="correo" placeholder="Correo electrónico" required>
        
        <input type="password" name="password" id="password" placeholder="Contraseña" required>
        
        <div id="medidor-fuerza" style="margin:10px 0;">
            <div style="display:flex; gap:4px;">
                <div id="barra1" style="height:8px; width:25%; background:#ddd; border-radius:4px; transition: background 0.3s;"></div>
                <div id="barra2" style="height:8px; width:25%; background:#ddd; border-radius:4px; transition: background 0.3s;"></div>
                <div id="barra3" style="height:8px; width:25%; background:#ddd; border-radius:4px; transition: background 0.3s;"></div>
                <div id="barra4" style="height:8px; width:25%; background:#ddd; border-radius:4px; transition: background 0.3s;"></div>
            </div>
            <small id="texto-fuerza" style="color:#666;">Escribe una contraseña segura</small>
        </div>
        
        <p style="font-size:11px; color:#999; text-align:left;">
            🔒 Mínimo 8 caracteres, mayúscula, minúscula, número y símbolo (@$!%*?&#)
        </p>
        
        <button type="submit">Registrarse</button>
    </form>

    <div style="margin: 20px 0; color: #999;">
        <span>──── o ────</span>
    </div>

    <a href="/login/google">
        <button style="background: #fff; color: #444; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%;">
            <svg width="20" height="20" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Registrarse con Google
        </button>
    </a>

    <p>
        ¿Ya tienes cuenta?
        <a href="/">Iniciar sesión</a>
    </p>
</div>

<script>
document.getElementById('password').addEventListener('input', function() {
    var password = this.value;
    var fuerza = 0;
    
    if (password.length >= 8) fuerza += 25;
    if (password.length >= 12) fuerza += 10;
    if (/[A-Z]/.test(password)) fuerza += 15;
    if (/[a-z]/.test(password)) fuerza += 15;
    if (/[0-9]/.test(password)) fuerza += 15;
    if (/[@$!%*?&#]/.test(password)) fuerza += 20;
    
    fuerza = Math.min(fuerza, 100);
    
    var color;
    var texto;
    if (password.length === 0) {
        color = '#ddd';
        texto = 'Escribe una contraseña segura';
    } else if (fuerza <= 25) {
        color = '#dc3545';
        texto = 'Débil - Agrega mayúsculas, números y símbolos';
    } else if (fuerza <= 50) {
        color = '#ffc107';
        texto = 'Regular - Sigue mejorando';
    } else if (fuerza <= 75) {
        color = '#fd7e14';
        texto = 'Buena - ¡Casi llegas!';
    } else {
        color = '#28a745';
        texto = '¡Fuerte! Contraseña segura ✅';
    }
    
    document.getElementById('barra1').style.background = fuerza >= 25 ? color : '#ddd';
    document.getElementById('barra2').style.background = fuerza >= 50 ? color : '#ddd';
    document.getElementById('barra3').style.background = fuerza >= 75 ? color : '#ddd';
    document.getElementById('barra4').style.background = fuerza >= 100 ? color : '#ddd';
    document.getElementById('texto-fuerza').textContent = texto;
    document.getElementById('texto-fuerza').style.color = color;
});
</script>

</body>
</html>
