<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verificar 2FA - Pet Spa</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="container">
      <h2>🔐 Verificación en Dos Pasos</h2>

      <p style="color: #666">
        Ingresa el código de 6 dígitos de <strong>Google Authenticator</strong>
      </p>
      <p style="color: #999; font-size: 14px">Cuenta: {{ email }}</p>

      {% if error %}
      <p
        style="
          color: #dc3545;
          background: #ffe6e6;
          padding: 10px;
          border-radius: 5px;
        "
      >
        ❌ {{ error }}
      </p>
      {% endif %}

      <form action="/verificar-2fa" method="POST">
        <input
          type="text"
          name="codigo"
          placeholder="000000"
          maxlength="6"
          style="font-size: 24px; text-align: center; letter-spacing: 10px"
          required
          autofocus
        />
        <button type="submit">Verificar</button>
      </form>

      <br />
      <a href="/dashboard" style="color: #dc3545"
        >Cancelar y volver al inicio</a
      >
    </div>
  </body>
</html>
